<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Car | Tivoli Terme</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: white; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .social-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .social-link:hover .social-icon-img {
            transform: scale(1.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600"></div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Caricamento...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9368d42766b9a011bb4280",
            measurementId: "G-223C65R2FQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "max-car-tivoli";
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const IG_ICON = "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg";
        const FB_ICON = "https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg";

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedCar, setSelectedCar] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [filter, setFilter] = useState('Tutte');
            const [loading, setLoading] = useState(true);
            const [activeImage, setActiveImage] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(snapshot => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                setAutoList(data);
                                setLoading(false);
                                const loader = document.getElementById('loader');
                                if (loader) loader.style.opacity = '0';
                                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
                            }, (err) => {
                                console.error("Errore database:", err);
                                setLoading(false);
                            });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Errore Auth:", error);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                window.scrollTo(0, 0);
            }, [currentPage, autoList, filter, selectedCar]);

            // Funzione per gestire l'apertura del prodotto
            const openCarDetails = (car) => {
                setSelectedCar(car);
                setActiveImage(car.immagine); // Default alla cover
                setCurrentPage('prodotto');
            };

            const carImages = useMemo(() => {
                if (!selectedCar) return [];
                const images = [selectedCar.immagine];
                if (selectedCar.galleria && Array.isArray(selectedCar.galleria)) {
                    // Evita duplicati se l'immagine principale è già in galleria
                    selectedCar.galleria.forEach(img => {
                        if (img !== selectedCar.immagine) images.push(img);
                    });
                }
                return images;
            }, [selectedCar]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <nav className="bg-white/95 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setCurrentPage('home'); setSelectedCar(null); }}>
                                <div className="bg-red-600 p-2 rounded-lg text-white">
                                    <i data-lucide="car" className="w-6 h-6"></i>
                                </div>
                                <span className="font-extrabold uppercase italic tracking-tighter text-xl text-slate-900">Max Car</span>
                            </div>
                            <div className="flex gap-4 md:gap-8 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                                <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'home' ? 'text-red-600' : ''}`}>Home</button>
                                <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'piazzale' ? 'text-red-600' : ''}`}>Piazzale</button>
                                <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'vendi' ? 'text-red-600' : ''}`}>Vendi Auto</button>
                                <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'contatti' ? 'text-red-600' : ''}`}>Contatti</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow">
                        {currentPage === 'home' && (
                            <>
                                <div className="hero-bg min-h-[80vh] flex items-center justify-center text-center text-white px-4">
                                    <div className="max-w-3xl animate-in fade-in slide-in-from-bottom-10 duration-1000">
                                        <h1 className="text-6xl md:text-8xl font-extrabold uppercase italic tracking-tighter mb-6">Max Car <span className="text-red-600">Tivoli</span></h1>
                                        <p className="text-xl md:text-2xl font-light mb-10 text-slate-200">Compravendita autovetture usate garantite nel cuore del Lazio.</p>
                                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                                            <button onClick={() => setCurrentPage('piazzale')} className="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-xl font-bold uppercase transition shadow-2xl hover:scale-105 transform">Esplora il Piazzale</button>
                                            <a href="tel:+393791849480" className="bg-white/10 hover:bg-white/20 backdrop-blur-md px-12 py-5 rounded-xl font-bold uppercase transition border border-white/20">Chiama Ora</a>
                                        </div>
                                    </div>
                                </div>
                                <div className="py-20 px-6 bg-white border-y">
                                    <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="shield-check" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Garanzia Totale</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Offriamo garanzie complete fino a 36 mesi su ogni veicolo per la tua massima tranquillità.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="wallet" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Finanziamenti</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Soluzioni finanziarie personalizzate e flessibili per permetterti di guidare l'auto dei tuoi sogni.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="zap" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Velocità</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Pratiche rapide e compravendita sicura. Siamo operativi in tutta la zona del Lazio.</p>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                        
                        {(currentPage === 'home' || currentPage === 'piazzale') && (
                            <div className="py-16 px-6 max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b pb-8">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tight">Vetrina <span className="text-red-600 underline">Occasioni</span></h2>
                                    <div className="flex gap-2 bg-white p-1 rounded-full shadow-sm border">
                                        {['Tutte', 'SUV', 'Berlina', 'Utilitaria', 'Sportiva'].map(c => (
                                            <button key={c} onClick={() => setFilter(c)} className={`px-4 md:px-6 py-2 rounded-full text-[10px] font-bold uppercase transition ${filter === c ? 'bg-red-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {autoList.filter(a => filter === 'Tutte' || a.categoria === filter).map(car => (
                                        <div key={car.id} onClick={() => openCarDetails(car)} className="bg-white rounded-[2rem] overflow-hidden shadow-xl hover:shadow-2xl transition duration-500 border border-slate-100 group cursor-pointer">
                                            <div className="h-64 overflow-hidden relative">
                                                <img src={car.immagine} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt={car.modello} />
                                                <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-slate-900 shadow-sm uppercase tracking-widest">{car.categoria}</div>
                                                <div className="absolute bottom-4 right-4 bg-red-600 text-white px-4 py-2 rounded-2xl font-black text-xl shadow-lg">€{Number(car.prezzo)?.toLocaleString()}</div>
                                            </div>
                                            <div className="p-8">
                                                <h3 className="font-black uppercase text-2xl mb-1 tracking-tighter text-slate-900 leading-none">{car.marca}</h3>
                                                <p className="text-red-600 font-bold uppercase text-sm mb-4">{car.modello}</p>
                                                <div className="flex items-center gap-4 text-slate-400 text-[10px] font-bold uppercase border-t pt-4">
                                                    <span className="flex items-center gap-1"><i data-lucide="calendar" className="w-3 h-3"></i> {car.anno}</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="gauge" className="w-3 h-3"></i> {Number(car.km)?.toLocaleString()} KM</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="fuel" className="w-3 h-3"></i> {car.alimentazione}</span>
                                                </div>
                                                <button className="w-full mt-8 bg-slate-900 text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-widest group-hover:bg-red-600 transition duration-300">Visualizza Dettagli</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentPage === 'prodotto' && selectedCar && (
                            <div className="py-12 px-6 max-w-7xl mx-auto animate-in fade-in duration-500">
                                <button onClick={() => setCurrentPage('piazzale')} className="flex items-center gap-2 text-slate-500 font-bold uppercase text-xs mb-8 hover:text-red-600 transition">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> Torna al piazzale
                                </button>
                                
                                <div className="grid lg:grid-cols-2 gap-12 mb-16">
                                    {/* Gallery Section */}
                                    <div className="space-y-4">
                                        <div className="rounded-[2.5rem] overflow-hidden shadow-2xl bg-white border border-slate-100 aspect-video relative">
                                            <img src={activeImage} alt={selectedCar.modello} className="w-full h-full object-cover transition-opacity duration-300" />
                                        </div>
                                        {carImages.length > 1 && (
                                            <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                                {carImages.map((img, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        onClick={() => setActiveImage(img)}
                                                        className={`flex-shrink-0 w-24 h-24 rounded-2xl overflow-hidden cursor-pointer border-4 transition ${activeImage === img ? 'border-red-600 shadow-lg' : 'border-white opacity-70 hover:opacity-100'}`}
                                                    >
                                                        <img src={img} className="w-full h-full object-cover" />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Info Section */}
                                    <div className="flex flex-col">
                                        <span className="bg-red-100 text-red-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest w-fit mb-4">{selectedCar.categoria}</span>
                                        <h1 className="text-5xl font-black uppercase italic tracking-tighter text-slate-900 leading-none mb-2">{selectedCar.marca}</h1>
                                        <p className="text-2xl text-red-600 font-bold uppercase mb-6">{selectedCar.modello}</p>
                                        <div className="text-4xl font-black text-slate-900 mb-8 italic">€ {Number(selectedCar.prezzo)?.toLocaleString()}</div>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                                                <i data-lucide="calendar" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Anno</p>
                                                <p className="font-black text-md text-slate-900">{selectedCar.anno}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                                                <i data-lucide="gauge" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Km</p>
                                                <p className="font-black text-md text-slate-900">{Number(selectedCar.km)?.toLocaleString()}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                                                <i data-lucide="fuel" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Alim.</p>
                                                <p className="font-black text-md text-slate-900 truncate w-full text-center">{selectedCar.alimentazione}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                                                <i data-lucide="settings-2" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Cambio</p>
                                                <p className="font-black text-md text-slate-900">{selectedCar.cambio || 'Manuale'}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <a href={`https://wa.me/393791849480?text=Buongiorno, vorrei informazioni sulla ${selectedCar.marca} ${selectedCar.modello} vista sul sito.`} target="_blank" className="w-full bg-green-500 hover:bg-green-600 text-white flex items-center justify-center gap-3 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition shadow-lg"><i data-lucide="message-circle" className="w-5 h-5"></i>WhatsApp</a>
                                            <a href="tel:+393791849480" className="w-full bg-slate-900 hover:bg-red-600 text-white flex items-center justify-center gap-3 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition shadow-lg"><i data-lucide="phone" className="w-5 h-5"></i>Chiama Ora</a>
                                        </div>
                                    </div>
                                </div>

                                {/* Extended Details Section */}
                                <div className="grid lg:grid-cols-3 gap-12 border-t pt-16">
                                    <div className="lg:col-span-2">
                                        <h3 className="text-2xl font-black uppercase italic mb-6 text-slate-900">Descrizione <span className="text-red-600">Completa</span></h3>
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                            <p className="text-slate-600 leading-relaxed whitespace-pre-line text-sm md:text-base">
                                                {selectedCar.descrizione || "Nessuna descrizione dettagliata fornita per questo veicolo."}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <h3 className="text-2xl font-black uppercase italic mb-6 text-slate-900">Scheda <span className="text-red-600">Tecnica</span></h3>
                                        <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-xl">
                                            <ul className="space-y-5 text-sm uppercase font-bold tracking-wider">
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Marca</span>
                                                    <span>{selectedCar.marca}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Modello</span>
                                                    <span>{selectedCar.modello}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Anno</span>
                                                    <span>{selectedCar.anno}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Chilometri</span>
                                                    <span>{Number(selectedCar.km)?.toLocaleString()} km</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Alimentazione</span>
                                                    <span>{selectedCar.alimentazione}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Cambio</span>
                                                    <span>{selectedCar.cambio || "Manuale"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Potenza</span>
                                                    <span>{selectedCar.potenza ? `${selectedCar.potenza} CV` : "N/D"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Cilindrata</span>
                                                    <span>{selectedCar.cilindrata ? `${selectedCar.cilindrata} cc` : "N/D"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Colore</span>
                                                    <span>{selectedCar.colore || "N/D"}</span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'contatti' && (
                            <div className="py-24 px-6 max-w-5xl mx-auto animate-in fade-in duration-700">
                                <h2 className="text-5xl font-black uppercase italic mb-16 text-center">Contattaci</h2>
                                <div className="grid md:grid-cols-2 gap-16 items-start">
                                    <div className="space-y-10">
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="map-pin" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Sede Principale</h4>
                                                <p className="text-xl font-bold text-slate-900 leading-tight">Via Caio Plinio, II 2<br/>00019 Tivoli Terme (RM)</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="mail" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Email Ufficiale</h4>
                                                <p className="text-xl font-bold text-slate-900 break-all">massimodesilvio12@gmail.com</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="phone" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Linea Diretta</h4>
                                                <p className="text-2xl font-black text-slate-900">+39 379 184 9480</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-slate-100 flex flex-col items-center text-center justify-center min-h-[300px]">
                                        <h3 className="text-3xl font-black uppercase italic mb-8 text-slate-900 tracking-tighter">Social Network</h3>
                                        <div className="flex flex-col gap-4 w-full">
                                            <a href="https://www.instagram.com/_maxcar__/" target="_blank" className="bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-4 hover:bg-red-600 transition shadow-lg transform hover:-translate-y-1">
                                                <img src={IG_ICON} className="w-5 h-5" alt="Instagram" /> Instagram
                                            </a>
                                            <a href="https://www.facebook.com/profile.php?id=61584246279529&locale=it_IT" target="_blank" className="bg-[#1877F2] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-4 hover:bg-blue-700 transition shadow-lg transform hover:-translate-y-1">
                                                <img src={FB_ICON} className="w-5 h-5" alt="Facebook" /> Facebook
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
