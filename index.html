<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Car Tivoli Terme | Vendita Auto</title>
    
    <!-- Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel per far funzionare il codice nel browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Versioni compatibili) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hero-gradient {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Configurazione Firebase e costanti d'ambiente
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';

        // Inizializzazione Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [filter, setFilter] = useState('Tutte');
            const [activeSection, setActiveSection] = useState('home'); // home, catalogo, chi-siamo
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isUploading, setIsUploading] = useState(false);
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Benzina', categoria: 'Berlina', immagine: ''
            });

            // 1. Gestione Autenticazione
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Errore autenticazione:", err);
                    }
                };

                initAuth();

                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // 2. Recupero Dati
            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data/automobili`;
                
                const unsubscribe = db.collection(path).onSnapshot(
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setAutoList(data);
                    },
                    (error) => console.error("Errore Firestore:", error)
                );

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [autoList, isAdminMode, user, activeSection]);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploading(true);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar({ ...newCar, immagine: reader.result });
                        setIsUploading(false);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCar = async (e) => {
                e.preventDefault();
                if (!user) return;
                if (!newCar.immagine) return alert("Per favore, carica una foto dell'auto.");
                
                try {
                    const path = `artifacts/${appId}/public/data/automobili`;
                    await db.collection(path).add({
                        ...newCar,
                        prezzo: Number(newCar.prezzo),
                        anno: Number(newCar.anno),
                        km: Number(newCar.km),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setNewCar({ marca: '', modello: '', prezzo: '', anno: '', km: '', alimentazione: 'Benzina', categoria: 'Berlina', immagine: '' });
                    setIsAdminMode(false);
                } catch (err) {
                    console.error("Errore salvataggio:", err);
                }
            };

            const handleDelete = async (id) => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data/automobili`;
                await db.collection(path).doc(id).delete();
            };

            const filteredCars = filter === 'Tutte' ? autoList : autoList.filter(c => c.categoria === filter);

            // COMPONENTI SEZIONI
            const Home = () => (
                <div className="animate-fade-in">
                    <section className="hero-gradient min-h-[80vh] flex items-center text-white px-6">
                        <div className="max-w-7xl mx-auto w-full">
                            <div className="max-w-2xl">
                                <h2 className="text-red-600 font-black uppercase tracking-widest mb-4">Benvenuti da Max Car</h2>
                                <h1 className="text-6xl md:text-7xl font-black italic uppercase leading-none mb-6">
                                    Il tuo prossimo <span className="text-red-600">viaggio</span> inizia qui.
                                </h1>
                                <p className="text-lg text-slate-300 mb-8 font-medium">
                                    Selezioniamo le migliori auto usate a Tivoli Terme per garantirti sicurezza, stile e prestazioni imbattibili.
                                </p>
                                <div className="flex gap-4">
                                    <button onClick={() => setActiveSection('catalogo')} className="bg-red-600 px-8 py-4 rounded-2xl font-black uppercase tracking-tighter hover:bg-red-700 transition shadow-xl shadow-red-600/20">
                                        Sfoglia Catalogo
                                    </button>
                                    <button onClick={() => setActiveSection('chi-siamo')} className="bg-white/10 backdrop-blur-md border border-white/20 px-8 py-4 rounded-2xl font-black uppercase tracking-tighter hover:bg-white/20 transition">
                                        Chi Siamo
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                    
                    <section className="py-20 px-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12">
                        <div className="text-center">
                            <div className="bg-red-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="shield-check" className="text-red-600 w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold mb-3">Garanzia Certificata</h3>
                            <p className="text-slate-500 text-sm">Ogni veicolo viene sottoposto a oltre 100 controlli tecnici prima della vendita.</p>
                        </div>
                        <div className="text-center">
                            <div className="bg-red-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="banknote" className="text-red-600 w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold mb-3">Finanziamenti Su Misura</h3>
                            <p className="text-slate-500 text-sm">Offriamo soluzioni di pagamento flessibili adatte a ogni tua esigenza finanziaria.</p>
                        </div>
                        <div className="text-center">
                            <div className="bg-red-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="zap" className="text-red-600 w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold mb-3">Consegna Rapida</h3>
                            <p className="text-slate-500 text-sm">Pratiche veloci e consegna immediata per farti guidare subito la tua nuova auto.</p>
                        </div>
                    </section>
                </div>
            );

            const About = () => (
                <div className="animate-fade-in py-20 px-6 max-w-5xl mx-auto">
                    <h2 className="text-4xl font-black italic uppercase text-center mb-12">Passione per i <span className="text-red-600">motori</span></h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div className="rounded-[3rem] overflow-hidden shadow-2xl">
                            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=1000" alt="Showroom" className="w-full h-full object-cover" />
                        </div>
                        <div className="space-y-6">
                            <p className="text-slate-600 leading-relaxed">
                                Nata nel cuore di Tivoli Terme, **Max Car** è diventata nel tempo un punto di riferimento per chi cerca trasparenza e qualità nel mercato dell'usato.
                            </p>
                            <p className="text-slate-600 leading-relaxed">
                                La nostra missione non è solo vendere auto, ma costruire rapporti di fiducia con i nostri clienti. Ogni vettura nel nostro piazzale racconta una storia di cura e manutenzione rigorosa.
                            </p>
                            <div className="pt-6 grid grid-cols-2 gap-4">
                                <div>
                                    <p className="text-3xl font-black text-red-600">15+</p>
                                    <p className="text-xs font-bold uppercase text-slate-400">Anni di Esperienza</p>
                                </div>
                                <div>
                                    <p className="text-3xl font-black text-red-600">5000+</p>
                                    <p className="text-xs font-bold uppercase text-slate-400">Auto Consegnate</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const Catalog = () => (
                <div className="animate-fade-in py-12 px-6 max-w-7xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                        <div>
                            <h1 className="text-5xl font-black italic uppercase tracking-tighter text-slate-900">Il nostro <span className="text-red-600">usato</span></h1>
                            <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-2">Disponibilità immediata in sede</p>
                        </div>
                        <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-4 md:pb-0">
                            {['Tutte', 'SUV', 'Berlina', 'Utilitaria'].map(c => (
                                <button key={c} onClick={() => setFilter(c)} className={`px-6 py-2 rounded-full text-xs font-black uppercase transition-all ${filter === c ? 'bg-red-600 text-white shadow-lg shadow-red-600/20' : 'bg-white text-slate-400 hover:text-slate-900'}`}>{c}</button>
                            ))}
                        </div>
                    </div>

                    {!user ? (
                        <div className="text-center py-20 text-slate-300 animate-pulse">Caricamento catalogo...</div>
                    ) : autoList.length === 0 ? (
                        <div className="text-center py-32 bg-white rounded-[3rem] border border-slate-100 italic text-slate-400">Il piazzale è attualmente vuoto.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filteredCars.map(car => (
                                <div key={car.id} className="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl shadow-slate-200/50 border border-slate-100 group">
                                    <div className="h-72 overflow-hidden relative">
                                        <img src={car.immagine} className="w-full h-full object-cover transition duration-700 group-hover:scale-110" />
                                        <div className="absolute top-6 left-6 bg-red-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">{car.alimentazione}</div>
                                        <div className="absolute bottom-6 right-6 bg-slate-900/90 backdrop-blur-md text-white px-5 py-2 rounded-2xl font-black text-2xl shadow-2xl">
                                            €{car.prezzo.toLocaleString()}
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <p className="text-red-600 text-[10px] font-black uppercase tracking-[0.2em] mb-1">{car.marca}</p>
                                        <h3 className="text-2xl font-bold mb-6 text-slate-900">{car.modello}</h3>
                                        <div className="grid grid-cols-2 gap-4 text-slate-400 font-bold text-sm border-t border-slate-50 pt-6">
                                            <span className="flex items-center gap-2"><i data-lucide="calendar" className="w-4 h-4 text-red-600"></i> {car.anno}</span>
                                            <span className="flex items-center gap-2"><i data-lucide="gauge" className="w-4 h-4 text-red-600"></i> {car.km.toLocaleString()} KM</span>
                                        </div>
                                        <div className="mt-8 flex gap-2">
                                            <button className="flex-grow bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 transition shadow-lg">Contatta per test drive</button>
                                            {isAdminMode && (
                                                <button onClick={() => handleDelete(car.id)} className="bg-red-50 text-red-600 p-4 rounded-2xl hover:bg-red-600 hover:text-white transition shadow-sm"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    {/* NAV */}
                    <nav className="bg-white/90 backdrop-blur-md text-slate-900 px-6 py-4 sticky top-0 z-50 border-b border-slate-100">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setActiveSection('home'); setIsAdminMode(false);}}>
                                <i data-lucide="car" className="text-red-600 w-8 h-8"></i>
                                <span className="font-black uppercase tracking-tighter text-xl">Max Car <span className="text-red-600">Tivoli</span></span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-[0.2em]">
                                <button onClick={() => setActiveSection('home')} className={`${activeSection === 'home' ? 'text-red-600' : 'hover:text-red-600'}`}>Home</button>
                                <button onClick={() => setActiveSection('catalogo')} className={`${activeSection === 'catalogo' ? 'text-red-600' : 'hover:text-red-600'}`}>Piazzale</button>
                                <button onClick={() => setActiveSection('chi-siamo')} className={`${activeSection === 'chi-siamo' ? 'text-red-600' : 'hover:text-red-600'}`}>Chi Siamo</button>
                            </div>

                            <button onClick={() => setIsAdminMode(!isAdminMode)} className="bg-slate-900 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-red-600 transition shadow-lg">
                                {isAdminMode ? 'Chiudi Portale' : 'Area Gestione'}
                            </button>
                        </div>
                    </nav>

                    {/* ADMIN PANEL */}
                    {isAdminMode && (
                        <div className="bg-slate-900 text-white p-12 border-b-8 border-red-600 animate-fade-in">
                            <form onSubmit={handleAddCar} className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div className="space-y-6">
                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter mb-4 text-red-600">Carica nuova vettura</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required placeholder="Marca" className="bg-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-red-600" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                        <input required placeholder="Modello" className="bg-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-red-600" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <input required type="number" placeholder="Prezzo" className="bg-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-red-600" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="bg-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-red-600" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="KM" className="bg-white/10 p-4 rounded-2xl outline-none focus:ring-2 ring-red-600" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>
                                    <select className="w-full bg-white/10 p-4 rounded-2xl outline-none" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                        <option className="bg-slate-900">Berlina</option><option className="bg-slate-900">SUV</option><option className="bg-slate-900">Utilitaria</option><option className="bg-slate-900">Sportiva</option>
                                    </select>
                                    <button disabled={isUploading} className="w-full bg-red-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest hover:bg-red-700 transition">PUBBLICA ANNUNCIO</button>
                                </div>
                                <div className="border-4 border-dashed border-white/20 rounded-[3rem] flex flex-col items-center justify-center p-8 bg-white/5 min-h-[350px]">
                                    {newCar.immagine ? (
                                        <div className="relative w-full h-full">
                                            <img src={newCar.immagine} className="w-full h-full object-cover rounded-[2rem] shadow-2xl" />
                                            <button onClick={() => setNewCar({...newCar, immagine: ''})} className="absolute -top-4 -right-4 bg-red-600 p-4 rounded-full shadow-xl"><i data-lucide="trash-2" className="w-6 h-6"></i></button>
                                        </div>
                                    ) : (
                                        <label className="cursor-pointer text-center group">
                                            <div className="bg-white/10 p-8 rounded-full mb-4 inline-block group-hover:scale-110 transition group-hover:bg-red-600">
                                                <i data-lucide="upload-cloud" className="w-12 h-12"></i>
                                            </div>
                                            <span className="block font-black uppercase text-xs tracking-widest">Seleziona Foto</span>
                                            <input type="file" className="hidden" onChange={handleFileChange} accept="image/*" />
                                        </label>
                                    )}
                                </div>
                            </form>
                        </div>
                    )}

                    {/* CONTENT DYNAMICS */}
                    {activeSection === 'home' && <Home />}
                    {activeSection === 'chi-siamo' && <About />}
                    {activeSection === 'catalogo' && <Catalog />}
                    
                    {/* FOOTER */}
                    <footer className="bg-slate-900 text-white py-20 px-6 border-t-4 border-red-600 mt-20">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16">
                            <div>
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="car" className="text-red-600 w-8 h-8"></i>
                                    <span className="font-black uppercase text-xl">Max Car</span>
                                </div>
                                <p className="text-slate-400 text-sm italic">Vendita auto usate garantite a Tivoli Terme. Qualità e trasparenza dal primo chilometro.</p>
                            </div>
                            <div>
                                <h4 className="font-black uppercase text-[10px] tracking-[0.3em] text-red-600 mb-6">Contatti</h4>
                                <ul className="space-y-4 text-sm text-slate-300">
                                    <li className="flex items-center gap-3"><i data-lucide="map-pin" className="w-4 h-4"></i> Via Tiburtina, Tivoli Terme (RM)</li>
                                    <li className="flex items-center gap-3"><i data-lucide="phone" className="w-4 h-4"></i> +39 0774 123456</li>
                                    <li className="flex items-center gap-3"><i data-lucide="mail" className="w-4 h-4"></i> info@maxcartivoli.it</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-black uppercase text-[10px] tracking-[0.3em] text-red-600 mb-6">Social</h4>
                                <div className="flex gap-4">
                                    <button className="bg-white/5 p-4 rounded-2xl hover:bg-red-600 transition"><i data-lucide="instagram" className="w-5 h-5"></i></button>
                                    <button className="bg-white/5 p-4 rounded-2xl hover:bg-red-600 transition"><i data-lucide="facebook" className="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto mt-20 pt-10 border-t border-white/5 text-center text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                            © Max Car Tivoli Terme - Tutti i diritti riservati
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
