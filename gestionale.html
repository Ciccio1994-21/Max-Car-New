<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Max Car | Controllo Piazzale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ef4444 !important; outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9368d42766b9a011bb4280",
            measurementId: "G-223C65R2FQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "max-car-tivoli";
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Diesel', categoria: 'SUV', descrizione: '', immagini: []
            });

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    db.collection(COLLECTION_PATH).orderBy('createdAt', 'desc').onSnapshot(snap => {
                        setAutoList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        if (window.lucide) window.lucide.createIcons();
                    });
                };
                init();
            }, []);

            // Compressione ottimizzata per evitare limiti Firestore
            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                const remainingSlots = 5 - newCar.immagini.length;
                const filesToProcess = files.slice(0, remainingSlots);

                filesToProcess.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            // Riduzione risoluzione più aggressiva (max 800px)
                            const MAX_SIZE = 800; 
                            if (width > MAX_SIZE || height > MAX_SIZE) {
                                if (width > height) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                } else {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Qualità ridotta a 0.5 per risparmiare spazio
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                            setNewCar(prev => ({
                                ...prev,
                                immagini: [...prev.immagini, dataUrl].slice(0, 5)
                            }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = ""; 
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (newCar.immagini.length === 0) return alert("Inserisci almeno una foto!");
                
                setIsSubmitting(true);
                try {
                    // Calcolo approssimativo dimensione per evitare crash
                    const totalSize = JSON.stringify(newCar).length;
                    if (totalSize > 1000000) {
                        throw new Error("I dati sono troppo pesanti. Prova a caricare meno foto o foto più piccole.");
                    }

                    await db.collection(COLLECTION_PATH).add({
                        ...newCar,
                        prezzo: Number(newCar.prezzo),
                        km: Number(newCar.km),
                        anno: Number(newCar.anno),
                        immagine: newCar.immagini[0], 
                        galleria: newCar.immagini,   
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setNewCar({ 
                        marca: '', modello: '', prezzo: '', anno: '', km: '', 
                        alimentazione: 'Diesel', categoria: 'SUV', descrizione: '', immagini: [] 
                    });
                    alert("Auto pubblicata con successo!");
                } catch (error) {
                    console.error(error);
                    alert(error.message || "Errore durante il salvataggio. Riprova con meno foto.");
                }
                setIsSubmitting(false);
            };

            const deleteCar = async (id) => {
                if(confirm("Eliminare definitivamente questo annuncio?")) {
                    await db.collection(COLLECTION_PATH).doc(id).delete();
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-600 p-3 rounded-2xl shadow-lg shadow-red-600/20">
                                <i data-lucide="layout-dashboard" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">Gestionale <span className="text-red-600">Max Car</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Controllo Stock Piazzale</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="glass p-6 rounded-[2rem] sticky top-8">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 uppercase tracking-tight">
                                    <i data-lucide="plus-circle" className="w-5 h-5 text-red-600"></i> Aggiungi Veicolo
                                </h2>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-3 gap-2">
                                        {newCar.immagini.map((img, idx) => (
                                            <div key={idx} className="relative aspect-square rounded-xl overflow-hidden border border-white/10 shadow-lg">
                                                <img src={img} className="w-full h-full object-cover" />
                                                <button 
                                                    type="button"
                                                    onClick={() => removeImage(idx)}
                                                    className="absolute top-1 right-1 bg-red-600 text-white p-1 rounded-full hover:bg-red-700 transition"
                                                >
                                                    <i data-lucide="x" className="w-3 h-3"></i>
                                                </button>
                                                {idx === 0 && <div className="absolute bottom-0 left-0 right-0 bg-red-600 text-[8px] text-center font-bold uppercase py-0.5">Copertina</div>}
                                            </div>
                                        ))}
                                        
                                        {newCar.immagini.length < 5 && (
                                            <label className="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer transition">
                                                <i data-lucide="plus" className="w-6 h-6 mb-1 opacity-20"></i>
                                                <span className="text-[8px] font-bold uppercase opacity-40">Aggiungi</span>
                                                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>
                                    <p className="text-[10px] text-slate-500 text-center uppercase font-bold">Max 5 foto • Dimensione ottimizzata</p>

                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca (es. Fiat)" className="p-3 rounded-xl text-sm" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                        <input required placeholder="Modello (es. 500)" className="p-3 rounded-xl text-sm" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input required type="number" placeholder="Prezzo" className="p-3 rounded-xl text-sm" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 rounded-xl text-sm" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="KM" className="p-3 rounded-xl text-sm" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-3 rounded-xl text-sm" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Diesel</option>
                                            <option>Benzina</option>
                                            <option>Ibrida</option>
                                            <option>Elettrica</option>
                                            <option>GPL</option>
                                        </select>
                                        <select className="p-3 rounded-xl text-sm" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                            <option>SUV</option>
                                            <option>Berlina</option>
                                            <option>Utilitaria</option>
                                            <option>Station Wagon</option>
                                            <option>Coupé</option>
                                        </select>
                                    </div>

                                    <textarea 
                                        placeholder="Descrizione opzionale (optional)" 
                                        className="w-full p-3 rounded-xl text-sm min-h-[100px] resize-none"
                                        value={newCar.descrizione}
                                        onChange={e => setNewCar({...newCar, descrizione: e.target.value})}
                                    ></textarea>

                                    <button 
                                        disabled={isSubmitting}
                                        className={`w-full py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition shadow-xl ${isSubmitting ? 'bg-slate-700 animate-pulse' : 'bg-red-600 hover:bg-red-700'}`}
                                    >
                                        {isSubmitting ? 'Salvataggio...' : 'Pubblica nel piazzale'}
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div className="lg:col-span-2 space-y-4">
                            <h2 className="font-bold uppercase tracking-widest text-xs text-slate-500">Auto Online ({autoList.length})</h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.map(car => (
                                    <div key={car.id} className="glass p-4 rounded-3xl flex gap-4 items-center group relative overflow-hidden">
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-white/5 bg-slate-800">
                                            <img src={car.immagine} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="font-bold uppercase text-sm leading-tight">{car.marca} <span className="text-red-600">{car.modello}</span></h3>
                                            <div className="text-[10px] text-slate-500 font-bold mt-1 uppercase">
                                                {car.anno} • {car.km?.toLocaleString()} KM • €{car.prezzo?.toLocaleString()}
                                            </div>
                                            {car.descrizione && <p className="text-[9px] text-slate-400 mt-1 line-clamp-1 italic">{car.descrizione}</p>}
                                            <div className="flex gap-1 mt-2">
                                                {car.galleria?.map((_, i) => (
                                                    <div key={i} className="w-2 h-1 rounded-full bg-red-600/30"></div>
                                                ))}
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => deleteCar(car.id)}
                                            className="p-3 bg-red-600/10 text-red-600 rounded-xl md:opacity-0 group-hover:opacity-100 transition hover:bg-red-600 hover:text-white"
                                        >
                                            <i data-lucide="trash-2" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
