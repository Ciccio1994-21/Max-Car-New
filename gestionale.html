<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONALE | Max Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const myFirebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9368d42766b9a011bb4280",
            measurementId: "G-223C65R2FQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(myFirebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "max-car-tivoli"; // Allineato con max_car_tivoli.jsx

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [dbError, setDbError] = useState(null);
            
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Benzina', categoria: 'Berlina', immagini: []
            });

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        // Percorso preciso: artifacts/max-car-tivoli/public/data/automobili
                        const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili');
                        
                        const unsubscribe = path.onSnapshot(snapshot => {
                            const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            setAutoList(items);
                            setLoading(false);
                            setDbError(null);
                        }, err => {
                            console.error("Errore Database:", err.message);
                            setDbError(err.message);
                            setLoading(false);
                        });
                        
                        return () => unsubscribe();
                    } catch (e) {
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [autoList, loading, dbError]);

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar(prev => ({ ...prev, immagini: [...prev.immagini, reader.result].slice(0, 5) }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (uploading || dbError) return;
                if (newCar.immagini.length === 0) { alert("Aggiungi almeno una foto!"); return; }
                
                setUploading(true);
                try {
                    const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili');
                    await path.add({
                        marca: newCar.marca,
                        modello: newCar.modello,
                        prezzo: Number(newCar.prezzo),
                        anno: Number(newCar.anno),
                        km: Number(newCar.km),
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        immagine: newCar.immagini[0],
                        immagini: newCar.immagini,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewCar({ marca: '', modello: '', prezzo: '', anno: '', km: '', alimentazione: 'Benzina', categoria: 'Berlina', immagini: [] });
                    alert("Veicolo salvato correttamente!");
                } catch (err) {
                    alert("Errore! Assicurati di aver creato il database su Firebase.");
                } finally { setUploading(false); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950">
                    <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-red-600 mb-4"></div>
                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest text-center px-4">Connessione sicura al database Max Car...</p>
                </div>
            );

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto min-h-screen">
                    {dbError && (
                        <div className="mb-8 bg-red-600/10 border border-red-600/20 p-6 rounded-[2rem] flex flex-col items-center text-center">
                            <div className="bg-red-600 p-3 rounded-xl mb-3">
                                <i data-lucide="alert-triangle" className="text-white w-6 h-6"></i>
                            </div>
                            <h2 className="text-lg font-black uppercase italic">Database non attivo</h2>
                            <p className="text-slate-400 text-xs mt-1 mb-4">Il servizio Cloud Firestore deve essere attivato nella console.</p>
                            <a href="https://console.firebase.google.com/project/maxcar-7416d/firestore" target="_blank" className="bg-white text-black text-[10px] font-black uppercase px-6 py-3 rounded-xl hover:bg-slate-200 transition">Configura Ora</a>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-10 pb-6 border-b border-white/5">
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter">MAX CAR <span className="text-red-600">GESTIONALE</span></h1>
                        <div className={`px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest border ${dbError ? 'border-red-600/50 text-red-500' : 'border-green-600/50 text-green-500'}`}>
                            {dbError ? 'Sistema Offline' : 'Sistema Pronto'}
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4">
                            <form onSubmit={saveCar} className="bg-slate-900 p-6 rounded-[2rem] border border-white/5 shadow-2xl sticky top-8">
                                <h3 className="text-sm font-bold uppercase italic flex items-center gap-2 mb-6 text-slate-400">
                                    <span className="w-1.5 h-4 bg-red-600 rounded-full"></span>
                                    Carica Annuncio
                                </h3>
                                
                                <div className="space-y-4">
                                    <input required placeholder="Marca (es. Fiat)" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                    <input required placeholder="Modello" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="number" placeholder="Prezzo €" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Chilometri" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="number" placeholder="Anno" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <select className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-400" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Benzina</option><option>Diesel</option><option>Ibrida</option><option>Elettrica</option><option>GPL</option>
                                        </select>
                                    </div>

                                    <div className="bg-slate-950 border-2 border-dashed border-slate-800 p-4 rounded-2xl text-center">
                                        <label className="cursor-pointer group">
                                            <i data-lucide="camera" className="mx-auto mb-2 text-slate-700 group-hover:text-red-600 transition"></i>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase">Seleziona Foto</p>
                                            <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                        </label>
                                        <div className="flex gap-2 mt-4 overflow-x-auto hide-scrollbar">
                                            {newCar.immagini.map((img, i) => (
                                                <img key={i} src={img} className="w-10 h-10 object-cover rounded-lg border border-white/10" />
                                            ))}
                                        </div>
                                    </div>

                                    <button disabled={uploading || dbError} className="w-full bg-red-600 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl hover:bg-red-700 transition-all disabled:opacity-20">
                                        {uploading ? 'Caricamento...' : 'Pubblica Veicolo'}
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div className="lg:col-span-8">
                            <h2 className="text-xl font-bold uppercase italic mb-6">Piazzale Attuale ({autoList.length})</h2>
                            <div className="grid md:grid-cols-2 gap-6">
                                {autoList.length === 0 ? (
                                    <div className="col-span-full py-20 bg-slate-900/30 rounded-[3rem] border border-dashed border-white/5 text-center">
                                        <i data-lucide="car-front" className="mx-auto text-slate-800 w-12 h-12 mb-4"></i>
                                        <p className="text-slate-600 uppercase text-[10px] font-bold tracking-widest">Nessuna auto pubblicata</p>
                                    </div>
                                ) : (
                                    autoList.map(car => (
                                        <div key={car.id} className="bg-slate-900 rounded-[2.5rem] border border-white/5 overflow-hidden flex flex-col">
                                            <img src={car.immagine} className="h-48 w-full object-cover" />
                                            <div className="p-6">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <p className="text-red-600 text-[10px] font-black uppercase tracking-widest">{car.marca}</p>
                                                        <h4 className="text-lg font-bold uppercase text-white">{car.modello}</h4>
                                                    </div>
                                                    <p className="text-xl font-black italic">€{car.prezzo?.toLocaleString()}</p>
                                                </div>
                                                <div className="flex justify-between pt-4 border-t border-white/5">
                                                    <span className="text-[10px] font-bold text-slate-500 uppercase">{car.anno} • {car.km?.toLocaleString()} KM</span>
                                                    <button onClick={async () => {
                                                        if(confirm("Eliminare definitivamente?")) {
                                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili').doc(car.id).delete();
                                                        }
                                                    }} className="text-slate-600 hover:text-red-600 transition">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
