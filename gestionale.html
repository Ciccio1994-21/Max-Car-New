<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONALE | Max Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Inizializzazione Firebase fuori dal componente per persistenza
        const firebaseConfig = JSON.parse(__firebase_config);
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db_ref = firebase.firestore();
        const auth_ref = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [user, setUser] = useState(null);
            
            const [newCar, setNewCar] = useState({
                marca: '', 
                modello: '', 
                prezzo: '', 
                anno: '', 
                km: '', 
                alimentazione: 'Benzina', 
                categoria: 'Berlina', 
                descrizione: '',
                immagini: []
            });

            useEffect(() => {
                const initAuthAndData = async () => {
                    try {
                        // 1. Gestione Autenticazione (MANDATORIA PRIMA DI FIRESTORE)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth_ref.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth_ref.signInAnonymously();
                        }

                        auth_ref.onAuthStateChanged((u) => {
                            if (u) {
                                setUser(u);
                                // 2. Listeners Dati (Percorso corretto Regola 1)
                                const collectionPath = db_ref.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili');
                                
                                collectionPath.onSnapshot(
                                    snapshot => {
                                        const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                        setAutoList(items);
                                        setLoading(false);
                                        if (window.lucide) window.lucide.createIcons();
                                    },
                                    err => {
                                        console.error("Firestore Snapshot Error:", err);
                                        setLoading(false);
                                    }
                                );
                            }
                        });
                    } catch (error) {
                        console.error("Auth/Init Error:", error);
                        setLoading(false);
                    }
                };

                initAuthAndData();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [autoList, loading, newCar.immagini]);

            const compressImage = (base64Str, maxWidth = 800, maxHeight = 600) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = () => resolve(base64Str);
                });
            };

            const saveCar = async (e) => {
                if (e) e.preventDefault();
                if (!user) {
                    alert("Errore: Sessione non valida. Ricarica la pagina.");
                    return;
                }
                
                if (uploading) return;
                if (newCar.immagini.length === 0) {
                    alert("Carica almeno una foto per procedere.");
                    return;
                }

                setUploading(true);
                
                try {
                    const compressedImgs = await Promise.all(
                        newCar.immagini.map(img => compressImage(img))
                    );

                    const carData = {
                        marca: String(newCar.marca).trim(),
                        modello: String(newCar.modello).trim(),
                        prezzo: Number(newCar.prezzo) || 0,
                        anno: Number(newCar.anno) || new Date().getFullYear(),
                        km: Number(newCar.km) || 0,
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        descrizione: String(newCar.descrizione || '').trim(),
                        immagini: compressedImgs,
                        immagine: compressedImgs[0],
                        userId: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    // Percorso corretto per il salvataggio
                    await db_ref.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili').add(carData);
                    
                    setNewCar({ 
                        marca: '', modello: '', prezzo: '', anno: '', km: '', 
                        alimentazione: 'Benzina', categoria: 'Berlina', descrizione: '', immagini: [] 
                    });
                    alert("✅ Annuncio pubblicato con successo!");
                } catch (err) {
                    console.error("Firestore Add Error:", err);
                    alert("Errore salvataggio: Verificare i permessi del database.");
                } finally {
                    setUploading(false);
                }
            };

            const deleteCar = async (id) => {
                if (!user) return;
                if (!confirm("Sei sicuro di voler eliminare questo annuncio?")) return;
                
                try {
                    await db_ref.collection('artifacts').doc(appId).collection('public').doc('data').collection('automobili').doc(id).delete();
                } catch (err) {
                    console.error("Delete Error:", err);
                    alert("Errore durante l'eliminazione.");
                }
            };

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                if (newCar.immagini.length + files.length > 5) {
                    alert("Limite massimo: 5 foto.");
                    return;
                }
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar(prev => ({
                            ...prev,
                            immagini: [...prev.immagini, reader.result]
                        }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-slate-950">
                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-red-600"></div>
                    <div className="font-bold uppercase tracking-widest text-slate-500 text-[10px]">Connessione Sicura in corso...</div>
                </div>
            );

            return (
                <div className="p-6 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                        <div>
                            <h1 className="text-2xl font-black text-red-600 uppercase italic leading-none">Max Car | Gestionale</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">
                                {user ? `SESSIONE ATTIVA: ${user.uid.substring(0, 12)}...` : 'RICONNESSIONE...'}
                            </p>
                        </div>
                        <div className="hidden md:flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-white/5 text-[10px] font-bold uppercase tracking-widest text-green-500">
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            Sistema Online
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-10">
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="bg-slate-800 p-6 rounded-3xl shadow-2xl sticky top-6 border border-white/5">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 uppercase italic">
                                    <i data-lucide="plus-square" className="text-red-600 w-5 h-5"></i> 
                                    Nuovo Annuncio
                                </h2>
                                
                                <div className="space-y-4">
                                    <input required placeholder="Marca" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                    <input required placeholder="Modello" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm text-white" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option value="Benzina">Benzina</option>
                                            <option value="Diesel">Diesel</option>
                                            <option value="Ibrida">Ibrida</option>
                                            <option value="Elettrica">Elettrica</option>
                                            <option value="GPL">GPL</option>
                                        </select>
                                        <select className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm text-white" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                            <option value="Berlina">Berlina</option>
                                            <option value="SUV">SUV</option>
                                            <option value="Utilitaria">Utilitaria</option>
                                            <option value="Coupé">Coupé</option>
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Prezzo (€)</label>
                                            <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm text-white" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Anno</label>
                                            <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm text-white" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] uppercase font-bold text-slate-500 px-1">KM Percorsi</label>
                                        <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none text-sm text-white" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Immagini ({newCar.immagini.length}/5)</label>
                                        <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                                            {newCar.immagini.map((img, idx) => (
                                                <div key={idx} className="relative w-14 h-14 flex-shrink-0 group">
                                                    <img src={img} className="w-full h-full object-cover rounded-lg border border-white/10" />
                                                    <button type="button" onClick={() => removeImage(idx)} className="absolute -top-1 -right-1 bg-red-600 rounded-full p-0.5 shadow-md">
                                                        <i data-lucide="x" className="w-3 h-3 text-white"></i>
                                                    </button>
                                                </div>
                                            ))}
                                            {newCar.immagini.length < 5 && (
                                                <div className="w-14 h-14 flex-shrink-0 border-2 border-dashed border-slate-700 rounded-lg flex items-center justify-center relative cursor-pointer hover:bg-slate-900 transition">
                                                    <i data-lucide="camera" className="w-5 h-5 text-slate-600"></i>
                                                    <input type="file" multiple className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onChange={handleFile} />
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="pt-4 border-t border-white/5">
                                        <button 
                                            type="submit"
                                            disabled={uploading} 
                                            className="w-full bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg hover:bg-red-700 active:scale-95 transition disabled:opacity-50 flex items-center justify-center gap-2"
                                        >
                                            {uploading ? (
                                                <><div className="animate-spin rounded-full h-4 w-4 border-t-2 border-white"></div> Caricamento...</>
                                            ) : 'Pubblica Annuncio'}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div className="lg:col-span-2">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-bold flex items-center gap-2 italic uppercase">
                                    Veicoli in Esposizione <span className="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full not-italic">{autoList.length}</span>
                                </h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.length === 0 ? (
                                    <div className="col-span-full py-20 text-center border-2 border-dashed border-white/5 rounded-3xl">
                                        <i data-lucide="info" className="w-8 h-8 text-slate-700 mx-auto mb-3"></i>
                                        <p className="text-slate-600 font-bold uppercase text-xs tracking-widest italic">Nessuna auto nel database</p>
                                    </div>
                                ) : (
                                    autoList.map(car => (
                                        <div key={car.id} className="bg-slate-800/40 rounded-2xl p-4 flex gap-4 items-center border border-white/5 group hover:border-red-600/30 transition-all shadow-sm hover:shadow-xl">
                                            <img src={car.immagine || car.immagini?.[0]} className="w-20 h-20 rounded-xl object-cover bg-slate-900" />
                                            <div className="flex-grow min-w-0">
                                                <h4 className="font-black uppercase text-xs truncate leading-tight">{car.marca} {car.modello}</h4>
                                                <p className="text-[10px] text-red-500 font-bold uppercase mb-1">€{car.prezzo?.toLocaleString()}</p>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">{car.anno} • {car.km?.toLocaleString()} KM • {car.alimentazione}</p>
                                            </div>
                                            <button onClick={() => deleteCar(car.id)} className="p-2 text-slate-600 hover:text-red-500 transition-colors">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
