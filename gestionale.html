<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Car Tivoli Terme | Vendita Auto</title>
    
    <!-- Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel per far funzionare il codice nel browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Versioni compatibili) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Configurazione Firebase e costanti d'ambiente
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';

        // Inizializzazione Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [filter, setFilter] = useState('Tutte');
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isUploading, setIsUploading] = useState(false);
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Benzina', categoria: 'Berlina', immagine: ''
            });

            // 1. Gestione Autenticazione (Regola MANDATORIA 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Errore autenticazione:", err);
                    }
                };

                initAuth();

                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        console.log("Utente autenticato:", u.uid);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // 2. Recupero Dati (Solo DOPO autenticazione e con percorso corretto)
            useEffect(() => {
                if (!user) return;

                // Percorso corretto: /artifacts/{appId}/public/data/{collectionName}
                const path = `artifacts/${appId}/public/data/automobili`;
                
                const unsubscribe = db.collection(path).onSnapshot(
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setAutoList(data);
                    },
                    (error) => {
                        console.error("Errore Firestore listener:", error);
                    }
                );

                return () => unsubscribe();
            }, [user]);

            // Refresh icone Lucide dopo il rendering
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [autoList, isAdminMode, user]);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploading(true);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar({ ...newCar, immagine: reader.result });
                        setIsUploading(false);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCar = async (e) => {
                e.preventDefault();
                if (!user) return;
                if (!newCar.immagine) return alert("Per favore, carica una foto dell'auto.");
                
                try {
                    const path = `artifacts/${appId}/public/data/automobili`;
                    await db.collection(path).add({
                        ...newCar,
                        prezzo: Number(newCar.prezzo),
                        anno: Number(newCar.anno),
                        km: Number(newCar.km),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setNewCar({ marca: '', modello: '', prezzo: '', anno: '', km: '', alimentazione: 'Benzina', categoria: 'Berlina', immagine: '' });
                    setIsAdminMode(false);
                } catch (err) {
                    console.error("Errore durante il salvataggio:", err);
                    alert("Errore nel salvataggio. Controlla la console.");
                }
            };

            const handleDelete = async (id) => {
                if (!user) return;
                try {
                    const path = `artifacts/${appId}/public/data/automobili`;
                    await db.collection(path).doc(id).delete();
                } catch (err) {
                    console.error("Errore durante l'eliminazione:", err);
                }
            };

            const filteredCars = filter === 'Tutte' ? autoList : autoList.filter(c => c.categoria === filter);

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* NAV */}
                    <nav className="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <i data-lucide="car" className="text-red-600 w-8 h-8"></i>
                                <span className="font-black uppercase tracking-tighter text-xl">Max Car <span className="text-red-600">Tivoli</span></span>
                            </div>
                            <div className="flex items-center gap-4">
                                {!user && <div className="text-[10px] text-slate-500 animate-pulse uppercase font-bold">Connessione...</div>}
                                <button 
                                    onClick={() => setIsAdminMode(!isAdminMode)}
                                    className="bg-red-600 px-5 py-2 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-red-700 transition transform active:scale-95 shadow-lg shadow-red-900/20"
                                >
                                    <i data-lucide={isAdminMode ? "x" : "settings"} className="w-4 h-4"></i>
                                    {isAdminMode ? "Chiudi" : "Gestione"}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* ADMIN PANEL */}
                    {isAdminMode && (
                        <div className="bg-white border-b-4 border-red-600 p-6 animate-fade-in">
                            <form onSubmit={handleAddCar} className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-4">
                                    <h3 className="text-lg font-black uppercase text-slate-800 flex items-center gap-2">
                                        <i data-lucide="plus-circle" className="text-red-600"></i> Aggiungi Veicolo
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca" className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-red-600 transition" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                        <input required placeholder="Modello" className="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:border-red-600 transition" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-3">
                                        <input required type="number" placeholder="Prezzo €" className="p-3 border rounded-xl bg-slate-50 outline-none focus:border-red-600" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 border rounded-xl bg-slate-50 outline-none focus:border-red-600" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <input required type="number" placeholder="KM" className="p-3 border rounded-xl bg-slate-50 outline-none focus:border-red-600" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>
                                    <select className="w-full p-3 border rounded-xl bg-slate-50" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                        <option>Berlina</option><option>SUV</option><option>Utilitaria</option><option>Sportiva</option>
                                    </select>
                                    <button 
                                        disabled={isUploading}
                                        className="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-red-600 transition tracking-widest disabled:opacity-50"
                                    >
                                        PUBBLICA NEL CATALOGO
                                    </button>
                                </div>
                                <div className="border-4 border-dashed border-slate-100 rounded-3xl flex flex-col items-center justify-center p-4 bg-slate-50 min-h-[300px] relative overflow-hidden group">
                                    {newCar.immagine ? (
                                        <div className="relative w-full h-full">
                                            <img src={newCar.immagine} className="w-full h-full object-cover rounded-2xl shadow-md" />
                                            <button onClick={() => setNewCar({...newCar, immagine: ''})} className="absolute top-2 right-2 bg-red-600 text-white p-2 rounded-full shadow-lg"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                    ) : (
                                        <label className="cursor-pointer text-center p-10">
                                            <div className="bg-white p-6 rounded-full shadow-sm mb-4 inline-block group-hover:scale-110 transition">
                                                <i data-lucide="camera" className="text-red-600 w-10 h-10"></i>
                                            </div>
                                            <span className="text-sm font-black block uppercase text-slate-600">Seleziona Foto</span>
                                            <span className="text-[10px] text-slate-400 mt-1 uppercase">Carica da dispositivo</span>
                                            <input type="file" className="hidden" onChange={handleFileChange} accept="image/*" />
                                        </label>
                                    )}
                                </div>
                            </form>
                        </div>
                    )}

                    {/* CATALOGO */}
                    <main className="max-w-7xl mx-auto p-6 lg:p-12">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                            <div>
                                <h1 className="text-5xl font-black italic uppercase tracking-tighter text-slate-900">Le nostre <span className="text-red-600">occasioni</span></h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-2">Aggiornato in tempo reale dal piazzale</p>
                            </div>
                            <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-4 md:pb-0">
                                {['Tutte', 'SUV', 'Berlina', 'Utilitaria'].map(c => (
                                    <button 
                                        key={c} 
                                        onClick={() => setFilter(c)} 
                                        className={`px-6 py-2 rounded-full text-xs font-black uppercase transition-all shadow-sm ${filter === c ? 'bg-red-600 text-white scale-105' : 'bg-white text-slate-400 hover:text-slate-900'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {!user ? (
                            <div className="flex flex-col items-center justify-center py-32 text-slate-300">
                                <div className="animate-spin mb-4"><i data-lucide="loader-2" className="w-12 h-12"></i></div>
                                <span className="font-bold uppercase text-xs tracking-widest">Connessione al database...</span>
                            </div>
                        ) : autoList.length === 0 ? (
                            <div className="text-center py-32 bg-white rounded-[3rem] border border-slate-100 shadow-inner">
                                <i data-lucide="search-x" className="mx-auto mb-4 text-slate-200 w-16 h-16"></i>
                                <p className="text-slate-400 text-xl font-bold italic">Nessun veicolo nel piazzale oggi.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {filteredCars.map(car => (
                                    <div key={car.id} className="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl shadow-slate-200/50 border border-slate-100 group animate-fade-in">
                                        <div className="h-72 overflow-hidden relative">
                                            <img src={car.immagine} className="w-full h-full object-cover transition duration-700 group-hover:scale-110" />
                                            <div className="absolute top-6 left-6 bg-red-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">{car.alimentazione}</div>
                                            <div className="absolute bottom-6 right-6 bg-slate-900/90 backdrop-blur-md text-white px-5 py-2 rounded-2xl font-black text-2xl shadow-2xl">
                                                €{car.prezzo.toLocaleString()}
                                            </div>
                                        </div>
                                        <div className="p-8">
                                            <p className="text-red-600 text-[10px] font-black uppercase tracking-[0.2em] mb-1">{car.marca}</p>
                                            <h3 className="text-2xl font-bold mb-6 text-slate-900">{car.modello}</h3>
                                            <div className="grid grid-cols-2 gap-4 text-slate-400 font-bold text-sm border-t border-slate-50 pt-6">
                                                <span className="flex items-center gap-2"><i data-lucide="calendar" className="w-4 h-4 text-red-600"></i> {car.anno}</span>
                                                <span className="flex items-center gap-2"><i data-lucide="gauge" className="w-4 h-4 text-red-600"></i> {car.km.toLocaleString()} KM</span>
                                            </div>
                                            
                                            <div className="mt-8 flex gap-2">
                                                <button className="flex-grow bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 transition shadow-lg shadow-slate-900/10">Richiedi Info</button>
                                                {isAdminMode && (
                                                    <button onClick={() => handleDelete(car.id)} className="bg-red-50 text-red-600 p-4 rounded-2xl hover:bg-red-600 hover:text-white transition shadow-sm">
                                                        <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    
                    <footer className="bg-slate-900 text-slate-500 py-12 text-center text-[10px] font-bold uppercase tracking-[0.3em]">
                        <div className="flex justify-center gap-6 mb-4 text-slate-400">
                             <i data-lucide="instagram" className="w-5 h-5 cursor-pointer hover:text-red-600"></i>
                             <i data-lucide="facebook" className="w-5 h-5 cursor-pointer hover:text-red-600"></i>
                        </div>
                        © Max Car Tivoli Terme - Sistema Piazzale Attivo
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
