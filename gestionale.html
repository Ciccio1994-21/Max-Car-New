<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONALE | Max Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [user, setUser] = useState(null);
            const db = useRef(null);
            const auth = useRef(null);
            
            const [newCar, setNewCar] = useState({
                marca: '', 
                modello: '', 
                prezzo: '', 
                anno: '', 
                km: '', 
                alimentazione: 'Benzina', 
                categoria: 'Berlina', 
                descrizione: '',
                immagini: []
            });

            useEffect(() => {
                const initFirebase = async () => {
                    const waitForFirebase = () => {
                        return new Promise((resolve) => {
                            const interval = setInterval(() => {
                                if (typeof firebase !== 'undefined' && firebase.apps && firebase.firestore) {
                                    clearInterval(interval);
                                    resolve();
                                }
                            }, 100);
                        });
                    };

                    await waitForFirebase();

                    try {
                        if (!firebase.apps.length) {
                            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                            if (config) {
                                firebase.initializeApp(config);
                            }
                        }
                        
                        db.current = firebase.firestore();
                        auth.current = firebase.auth();

                        const performSignIn = async () => {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await auth.current.signInWithCustomToken(__initial_auth_token);
                                } else {
                                    await auth.current.signInAnonymously();
                                }
                            } catch (e) {
                                console.error("Errore Autenticazione:", e);
                                setUser({ uid: 'guest-user-' + Math.random().toString(36).substr(2, 9), isAnonymous: true });
                            }
                        };

                        await performSignIn();

                        auth.current.onAuthStateChanged((u) => {
                            if (u) {
                                setUser(u);
                                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                                const path = `artifacts/${appId}/public/data/automobili`;
                                
                                db.current.collection(path).onSnapshot(
                                    snapshot => {
                                        setAutoList(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                                        setLoading(false);
                                        if (window.lucide) window.lucide.createIcons();
                                    },
                                    error => {
                                        console.error("Firestore Error:", error);
                                        setLoading(false);
                                    }
                                );
                            } else {
                                setTimeout(() => {
                                    if (!auth.current.currentUser) {
                                        setUser({ uid: 'emergency-user-' + Math.random().toString(36).substr(2, 9), isAnonymous: true });
                                        setLoading(false);
                                    }
                                }, 2000);
                            }
                        });
                    } catch (e) {
                        console.error("Initialization error:", e);
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [autoList, loading, newCar.immagini]);

            const compressImage = (base64Str, maxWidth = 800, maxHeight = 600) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = () => resolve(base64Str);
                });
            };

            const saveCar = async (e) => {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                console.log("CLICCATO PUBBLICA ANNUNCIO - Inizio validazione...");

                if (!db.current) {
                    alert("Errore: Database non pronto. Riprova tra pochi secondi.");
                    return;
                }
                
                if (uploading) return;
                
                if (newCar.immagini.length === 0) {
                    alert("Devi caricare almeno una foto.");
                    return;
                }

                if (!newCar.marca || !newCar.modello || !newCar.prezzo) {
                    alert("Compila tutti i campi obbligatori (Marca, Modello, Prezzo).");
                    return;
                }

                setUploading(true);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                
                try {
                    console.log("Stato: Compressione immagini...");
                    const compressedImgs = await Promise.all(
                        newCar.immagini.map(img => compressImage(img))
                    );

                    const carData = {
                        marca: String(newCar.marca).trim(),
                        modello: String(newCar.modello).trim(),
                        prezzo: Number(newCar.prezzo) || 0,
                        anno: Number(newCar.anno) || new Date().getFullYear(),
                        km: Number(newCar.km) || 0,
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        descrizione: String(newCar.descrizione || '').trim(),
                        immagini: compressedImgs,
                        immagine: compressedImgs[0],
                        userId: user ? user.uid : 'anonymous',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    console.log("Stato: Invio a Firestore...", carData);
                    await db.current.collection(`artifacts/${appId}/public/data/automobili`).add(carData);
                    
                    console.log("SUCCESSO: Annuncio inviato.");
                    setNewCar({ 
                        marca: '', modello: '', prezzo: '', anno: '', km: '', 
                        alimentazione: 'Benzina', categoria: 'Berlina', descrizione: '', immagini: [] 
                    });
                    alert("✅ Annuncio pubblicato correttamente!");
                } catch (err) {
                    console.error("ERRORE DURANTE IL SALVATAGGIO:", err);
                    alert("❌ Errore durante la pubblicazione: " + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const deleteCar = async (id) => {
                if (!db.current) return;
                if (!confirm("Eliminare definitivamente questo annuncio?")) return;
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                try {
                    await db.current.collection(`artifacts/${appId}/public/data/automobili`).doc(id).delete();
                } catch (err) {
                    console.error("Error deleting car:", err);
                }
            };

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                if (newCar.immagini.length + files.length > 5) {
                    alert("Massimo 5 foto consentite.");
                    return;
                }
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar(prev => ({
                            ...prev,
                            immagini: [...prev.immagini, reader.result]
                        }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    immagini: prev.immagini.filter((_, i) => i !== index)
                }));
            };

            // Helper per capire perché il tasto è disabilitato
            const getButtonStatus = () => {
                if (uploading) return "Caricamento in corso...";
                if (newCar.immagini.length === 0) return "Carica almeno una foto";
                if (!newCar.marca) return "Inserisci la Marca";
                if (!newCar.modello) return "Inserisci il Modello";
                if (!newCar.prezzo) return "Inserisci il Prezzo";
                return null;
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-slate-950">
                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-red-600"></div>
                    <div className="font-bold uppercase tracking-widest text-slate-500 text-xs text-center px-4">
                        Inizializzazione Sistema...
                    </div>
                </div>
            );

            return (
                <div className="p-6 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                        <div>
                            <h1 className="text-2xl font-black text-red-600 uppercase italic leading-none">Max Car | Gestionale</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">
                                {user ? `SESSIONE ATTIVA: ${user.uid.substring(0, 8)}` : 'SINCRO...'}
                            </p>
                        </div>
                        <div className="hidden md:flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-white/5 text-[10px] font-bold uppercase tracking-widest">
                            <span className={`w-2 h-2 rounded-full ${user ? 'bg-green-500 animate-pulse' : 'bg-yellow-500'}`}></span>
                            Sistema Online
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-10">
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="bg-slate-800 p-6 rounded-3xl shadow-2xl sticky top-6 border border-white/5">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 leading-none uppercase italic">
                                    <i data-lucide="plus-square" className="text-red-600 w-5 h-5"></i> 
                                    Nuovo Annuncio
                                </h2>
                                
                                <div className="space-y-4">
                                    <input required placeholder="Marca" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                    <input required placeholder="Modello" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Alimentazione</label>
                                            <select className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 text-sm text-white cursor-pointer" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                                <option value="Benzina">Benzina</option>
                                                <option value="Diesel">Diesel</option>
                                                <option value="Ibrida">Ibrida</option>
                                                <option value="Elettrica">Elettrica</option>
                                                <option value="GPL">GPL</option>
                                                <option value="Metano">Metano</option>
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Tipologia</label>
                                            <select className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 text-sm text-white cursor-pointer" value={newCar.categoria} onChange={e => setNewCar({...newCar, categoria: e.target.value})}>
                                                <option value="Berlina">Berlina</option>
                                                <option value="SUV">SUV</option>
                                                <option value="Utilitaria">Utilitaria</option>
                                                <option value="Coupé">Coupé</option>
                                                <option value="Cabrio">Cabrio</option>
                                                <option value="Station Wagon">Station Wagon</option>
                                                <option value="Fuoristrada">Fuoristrada</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Prezzo (€)</label>
                                            <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 text-sm text-white" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Anno</label>
                                            <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 text-sm text-white" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] uppercase font-bold text-slate-500 px-1">KM Percorsi</label>
                                        <input required type="number" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[9px] uppercase font-bold text-slate-500 px-1">Descrizione</label>
                                        <textarea placeholder="Dettagli aggiuntivi..." className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition text-sm text-white h-24 resize-none" value={newCar.descrizione} onChange={e => setNewCar({...newCar, descrizione: e.target.value})} />
                                    </div>
                                    
                                    <div className="space-y-3 pt-2">
                                        <label className="text-[9px] uppercase font-bold text-slate-500 px-1 flex justify-between">
                                            Media <span>{newCar.immagini.length}/5</span>
                                        </label>
                                        
                                        {newCar.immagini.length > 0 && (
                                            <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                                                {newCar.immagini.map((img, idx) => (
                                                    <div key={idx} className="relative w-16 h-16 flex-shrink-0 group">
                                                        <img src={img} className="w-full h-full object-cover rounded-lg border border-white/10" />
                                                        <button type="button" onClick={() => removeImage(idx)} className="absolute -top-1 -right-1 bg-red-600 rounded-full p-1 shadow-lg opacity-0 group-hover:opacity-100 transition">
                                                            <i data-lucide="x" className="w-2 h-2"></i>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {newCar.immagini.length < 5 && (
                                            <div className="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:bg-slate-900 transition relative group min-h-[80px] flex flex-col items-center justify-center">
                                                <i data-lucide="image-plus" className="opacity-20 w-6 h-6 mb-1"></i>
                                                <div className="text-[10px] font-bold uppercase opacity-40">Aggiungi Foto</div>
                                                <input type="file" multiple className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onChange={handleFile} />
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="pt-2">
                                        {getButtonStatus() && (
                                            <p className="text-center text-red-500 text-[10px] font-bold uppercase mb-2 animate-pulse">
                                                {getButtonStatus()}
                                            </p>
                                        )}
                                        <button 
                                            type="submit"
                                            disabled={uploading || !!getButtonStatus()} 
                                            className="w-full bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg hover:bg-red-700 active:scale-95 transition disabled:opacity-20 disabled:grayscale flex items-center justify-center gap-2"
                                        >
                                            {uploading ? (
                                                <>
                                                    <div className="animate-spin h-4 w-4 border-2 border-white/30 border-t-white rounded-full"></div>
                                                    Invio in corso...
                                                </>
                                            ) : 'Pubblica Annuncio'}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div className="lg:col-span-2">
                            <h2 className="text-lg font-bold flex items-center gap-2 italic uppercase mb-6">
                                Veicoli Online <span className="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full not-italic">{autoList.length}</span>
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).map(car => (
                                    <div key={car.id} className="bg-slate-800/40 rounded-2xl p-4 flex gap-4 items-start border border-white/5 hover:border-red-600/30 transition-all duration-300">
                                        <div className="w-24 h-24 flex-shrink-0 relative">
                                            <img src={car.immagine || (car.immagini && car.immagini[0])} className="w-full h-full rounded-xl object-cover shadow-lg" />
                                            {car.immagini && car.immagini.length > 1 && (
                                                <div className="absolute bottom-1 right-1 bg-black/60 px-1.5 py-0.5 rounded text-[8px] font-bold">
                                                    +{car.immagini.length - 1}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex-grow min-w-0">
                                            <div className="flex justify-between items-start">
                                                <h4 className="font-black uppercase text-sm tracking-tight leading-none mb-1 truncate">{car.marca} {car.modello}</h4>
                                                <button onClick={() => deleteCar(car.id)} className="text-slate-500 hover:text-red-500 transition ml-2">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 mb-2">
                                                <span className="text-[9px] font-bold uppercase text-red-500 bg-red-500/10 px-2 py-0.5 rounded-md">€{car.prezzo?.toLocaleString()}</span>
                                                <span className="text-[9px] font-bold uppercase text-slate-400 bg-slate-700/50 px-2 py-0.5 rounded-md">{car.km?.toLocaleString()} KM</span>
                                            </div>
                                            <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest mb-1">{car.anno} • {car.alimentazione}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
