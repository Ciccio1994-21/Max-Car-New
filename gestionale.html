<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONALE | Max Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configurazione Firebase condivisa
        const myFirebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:9368d42766b9a011bb4280",
            measurementId: "G-223C65R2FQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(myFirebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "max-car-tivoli"; 
        
        // Questo percorso DEVE essere identico in index.html e gestionale.html
        const COLLECTION_PATH = `artifacts/${appId}/public/data/automobili`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [dbError, setDbError] = useState(null);
            
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Benzina', categoria: 'Berlina', immagini: []
            });

            useEffect(() => {
                const init = async () => {
                    try {
                        // Accesso anonimo per permessi Firestore
                        await auth.signInAnonymously();
                        
                        // Sincronizzazione in tempo reale
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(snapshot => {
                                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                setAutoList(items);
                                setLoading(false);
                                setDbError(null);
                            }, err => {
                                console.error("Errore Firestore:", err);
                                if (err.code === 'failed-precondition') {
                                    // Fallback se l'indice non è ancora pronto
                                    db.collection(COLLECTION_PATH).onSnapshot(s => {
                                        const items = s.docs.map(d => ({ id: d.id, ...d.data() }));
                                        setAutoList(items);
                                        setLoading(false);
                                    });
                                } else {
                                    setDbError(err.message);
                                    setLoading(false);
                                }
                            });
                        
                        return () => unsubscribe();
                    } catch (e) {
                        setDbError("Errore di connessione");
                        setLoading(false);
                    }
                };
                init();
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [autoList, loading, dbError]);

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCar(prev => ({ ...prev, immagini: [...prev.immagini, reader.result].slice(0, 5) }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (uploading || dbError) return;
                if (newCar.immagini.length === 0) { alert("Inserisci almeno una foto"); return; }
                
                setUploading(true);
                try {
                    await db.collection(COLLECTION_PATH).add({
                        marca: newCar.marca.trim(),
                        modello: newCar.modello.trim(),
                        prezzo: Number(newCar.prezzo),
                        anno: Number(newCar.anno),
                        km: Number(newCar.km),
                        alimentazione: newCar.alimentazione,
                        categoria: newCar.categoria,
                        immagine: newCar.immagini[0], // Foto principale
                        immagini: newCar.immagini,    // Gallery
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setNewCar({ marca: '', modello: '', prezzo: '', anno: '', km: '', alimentazione: 'Benzina', categoria: 'Berlina', immagini: [] });
                    alert("✅ Veicolo salvato e visibile sul sito!");
                } catch (err) {
                    alert("Errore nel salvataggio. Controlla la console.");
                } finally { setUploading(false); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950">
                    <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-red-600 mb-4"></div>
                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest italic">Connessione Max Car Database...</p>
                </div>
            );

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto min-h-screen">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 pb-6 border-b border-white/5 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-600 p-2 rounded-lg shadow-lg shadow-red-600/20">
                                <i data-lucide="layout-dashboard" className="text-white w-5 h-5"></i>
                            </div>
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter text-white">MAX CAR <span className="text-red-600">GESTIONALE</span></h1>
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4">
                            <form onSubmit={saveCar} className="bg-slate-900/50 p-6 rounded-[2.5rem] border border-white/5 shadow-2xl sticky top-8">
                                <h3 className="text-[11px] font-black uppercase italic flex items-center gap-2 mb-8 text-slate-400 tracking-widest">Nuovo Inserimento</h3>
                                <div className="space-y-4">
                                    <input required placeholder="Marca" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                    <input required placeholder="Modello" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="number" placeholder="Prezzo €" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Km" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="number" placeholder="Anno" className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-red-600 transition" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                        <select className="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-slate-400 outline-none focus:border-red-600" value={newCar.alimentazione} onChange={e => setNewCar({...newCar, alimentazione: e.target.value})}>
                                            <option>Benzina</option><option>Diesel</option><option>Ibrida</option><option>Elettrica</option><option>GPL</option>
                                        </select>
                                    </div>
                                    <div className="bg-slate-950 border-2 border-dashed border-slate-800 p-6 rounded-2xl text-center">
                                        <label className="cursor-pointer">
                                            <i data-lucide="camera" className="text-red-600 w-8 h-8 mx-auto mb-2"></i>
                                            <p className="text-[10px] font-black text-slate-400 uppercase">Aggiungi Foto</p>
                                            <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                        </label>
                                        <div className="flex gap-2 mt-4 overflow-x-auto hide-scrollbar">
                                            {newCar.immagini.map((img, i) => (
                                                <img key={i} src={img} className="w-10 h-10 object-cover rounded-lg border border-white/10" />
                                            ))}
                                        </div>
                                    </div>
                                    <button disabled={uploading} className="w-full bg-red-600 py-5 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-red-600/20 hover:bg-red-700 transition-all disabled:opacity-50">
                                        {uploading ? 'Caricamento...' : 'Pubblica Veicolo'}
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div className="lg:col-span-8">
                            <h2 className="text-xl font-black uppercase italic text-white mb-8">Veicoli Online ({autoList.length})</h2>
                            <div className="grid md:grid-cols-2 gap-6">
                                {autoList.map(car => (
                                    <div key={car.id} className="bg-slate-900/40 rounded-[2.5rem] border border-white/5 overflow-hidden flex flex-col group transition-all">
                                        <img src={car.immagine} className="h-48 w-full object-cover" />
                                        <div className="p-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <p className="text-red-600 text-[10px] font-black uppercase tracking-widest">{car.marca}</p>
                                                    <h4 className="text-lg font-bold text-white">{car.modello}</h4>
                                                </div>
                                                <div className="text-lg font-black text-white">€{car.prezzo?.toLocaleString()}</div>
                                            </div>
                                            <div className="flex justify-between items-center pt-4 border-t border-white/5">
                                                <span className="text-[10px] font-bold text-slate-500 uppercase">{car.anno} • {car.km?.toLocaleString()} KM</span>
                                                <button onClick={async () => {
                                                    if(confirm("Vuoi rimuovere il veicolo?")) {
                                                        await db.collection(COLLECTION_PATH).doc(car.id).delete();
                                                    }
                                                }} className="text-red-500 hover:scale-110 transition">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
