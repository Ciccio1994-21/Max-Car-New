<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIONALE | Max Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const db = useRef(null);
            const auth = useRef(null);
            
            const [newCar, setNewCar] = useState({
                marca: '', modello: '', prezzo: '', anno: '', km: '', 
                alimentazione: 'Benzina', categoria: 'Berlina', immagine: ''
            });

            useEffect(() => {
                const initFirebase = async () => {
                    const waitForFirebase = () => {
                        return new Promise((resolve) => {
                            const interval = setInterval(() => {
                                if (typeof firebase !== 'undefined' && firebase.apps) {
                                    clearInterval(interval);
                                    resolve();
                                }
                            }, 100);
                        });
                    };

                    await waitForFirebase();

                    try {
                        if (!firebase.apps.length) {
                            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                            if (config) firebase.initializeApp(config);
                        }
                        
                        db.current = firebase.firestore();
                        auth.current = firebase.auth();

                        // Procedura di autenticazione obbligatoria prima di accedere ai dati
                        const performSignIn = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                try {
                                    await auth.current.signInWithCustomToken(__initial_auth_token);
                                } catch (e) {
                                    await auth.current.signInAnonymously();
                                }
                            } else {
                                await auth.current.signInAnonymously();
                            }
                        };

                        await performSignIn();

                        auth.current.onAuthStateChanged((u) => {
                            setUser(u);
                            if (u) {
                                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                                const path = `artifacts/${appId}/public/data/automobili`;
                                
                                // Listener attivato solo dopo l'autenticazione
                                db.current.collection(path).onSnapshot(
                                    snapshot => {
                                        setAutoList(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                                        setLoading(false);
                                        if (window.lucide) window.lucide.createIcons();
                                    },
                                    error => {
                                        console.error("Firestore Error:", error);
                                        setLoading(false);
                                    }
                                );
                            }
                        });
                    } catch (e) {
                        console.error("Initialization error:", e);
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [autoList, loading]);

            const saveCar = async (e) => {
                e.preventDefault();
                if (!user || !db.current) return;
                if (!newCar.immagine) return alert("Inserisci un'immagine");

                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                try {
                    await db.current.collection(`artifacts/${appId}/public/data/automobili`).add({
                        ...newCar,
                        prezzo: Number(newCar.prezzo),
                        km: Number(newCar.km),
                        anno: Number(newCar.anno),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setNewCar({ marca: '', modello: '', prezzo: '', anno: '', km: '', alimentazione: 'Benzina', categoria: 'Berlina', immagine: '' });
                } catch (err) {
                    console.error("Error saving car:", err);
                }
            };

            const deleteCar = async (id) => {
                if (!user || !db.current) return;
                if (!confirm("Eliminare definitivamente questo annuncio?")) return;
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'max-car-tivoli';
                try {
                    await db.current.collection(`artifacts/${appId}/public/data/automobili`).doc(id).delete();
                } catch (err) {
                    console.error("Error deleting car:", err);
                }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewCar({...newCar, immagine: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-slate-950">
                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-red-600"></div>
                    <div className="font-bold uppercase tracking-widest text-slate-500 text-xs">Inizializzazione Sistema...</div>
                </div>
            );

            return (
                <div className="p-6 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                        <div>
                            <h1 className="text-2xl font-black text-red-600 uppercase italic">Max Car | Gestionale</h1>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-tighter">
                                {user ? `Accesso eseguito: ${user.uid.substring(0, 8)}...` : 'Connessione in corso...'}
                            </p>
                        </div>
                        <div className="bg-slate-800 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/5">
                            Pannello Amministrativo
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-10">
                        {/* Form Colonna */}
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="bg-slate-800 p-6 rounded-3xl shadow-2xl sticky top-6 border border-white/5">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2"><i data-lucide="plus-circle" className="text-red-600"></i> Aggiungi Auto</h2>
                                <div className="space-y-4">
                                    <input required placeholder="Marca" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition" value={newCar.marca} onChange={e => setNewCar({...newCar, marca: e.target.value})} />
                                    <input required placeholder="Modello" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600 transition" value={newCar.modello} onChange={e => setNewCar({...newCar, modello: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input required type="number" placeholder="Prezzo (€)" className="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600" value={newCar.prezzo} onChange={e => setNewCar({...newCar, prezzo: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600" value={newCar.anno} onChange={e => setNewCar({...newCar, anno: e.target.value})} />
                                    </div>
                                    <input required type="number" placeholder="Chilometri" className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-red-600" value={newCar.km} onChange={e => setNewCar({...newCar, km: e.target.value})} />
                                    
                                    <div className="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:bg-slate-900 transition relative overflow-hidden group">
                                        {newCar.immagine ? (
                                            <div className="relative h-40">
                                                <img src={newCar.immagine} className="h-full w-full mx-auto rounded-lg object-cover" />
                                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                                    <span className="text-[10px] font-bold uppercase">Cambia Foto</span>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="py-8 flex flex-col items-center gap-2">
                                                <i data-lucide="camera" className="opacity-20 w-8 h-8"></i>
                                                <div className="text-[10px] font-bold uppercase opacity-40">Seleziona Foto Veicolo</div>
                                            </div>
                                        )}
                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" onChange={handleFile} />
                                    </div>
                                    
                                    <button disabled={!user} className="w-full bg-red-600 py-4 rounded-xl font-black uppercase shadow-lg hover:bg-red-700 transition disabled:opacity-50 disabled:cursor-not-allowed">Pubblica Annuncio</button>
                                </div>
                            </form>
                        </div>

                        {/* Lista Colonna */}
                        <div className="lg:col-span-2">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-bold flex items-center gap-2">
                                    Auto Online <span className="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full">{autoList.length}</span>
                                </h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.map(car => (
                                    <div key={car.id} className="bg-slate-800/50 rounded-2xl p-4 flex gap-4 items-center border border-white/5 hover:border-white/10 transition">
                                        <div className="w-20 h-20 flex-shrink-0">
                                            <img src={car.immagine} className="w-full h-full rounded-xl object-cover" />
                                        </div>
                                        <div className="flex-grow">
                                            <h4 className="font-bold uppercase text-xs tracking-tight">{car.marca} {car.modello}</h4>
                                            <p className="text-[10px] text-slate-400 font-bold">€{car.prezzo.toLocaleString()} • {car.km.toLocaleString()} KM</p>
                                            <p className="text-[9px] text-red-600/50 font-bold uppercase">{car.anno}</p>
                                        </div>
                                        <button onClick={() => deleteCar(car.id)} className="bg-red-500/10 text-red-500 p-3 rounded-xl hover:bg-red-500 hover:text-white transition">
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                ))}
                                {autoList.length === 0 && (
                                    <div className="col-span-full border border-dashed border-white/5 rounded-3xl py-20 text-center opacity-20">
                                        <i data-lucide="package-open" className="mx-auto w-12 h-12 mb-2"></i>
                                        <p className="uppercase font-bold text-xs tracking-widest">Nessun annuncio caricato</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
